
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>smalinux - Web Enthusiast</title>

  <meta name="description" content="I'm Sohaib Mohammed, a UI developer living in Cairo,EG. my Projects on codeCanyon, codePen, and HTML Templates screenshots you can find me on Facebook, Twitter, LinkedIn, StackOverflow and GitHub.">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style type="text/css">
    /* -------------------------------------------------------------------------- */
    /* FONT
    /* -------------------------------------------------------------------------- */
    @font-face {
      font-family: 'Noto Sans';
      font-style: normal;
      font-weight: 400;
      src: local('Noto Sans'), local('NotoSans'), url(http://themes.googleusercontent.com/static/fonts/notosans/v1/LeFlHvsZjXu2c3ZRgBq9nLO3LdcAZYWl9Si6vvxL-qU.woff) format('woff');
    }

    /* -------------------------------------------------------------------------- */
    /* GLOBAL
    /* -------------------------------------------------------------------------- */
    html {
      font-size: 100%;
    }

    body {
      font-family: 'Noto Sans', helvetica, arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      font-size: 16px;
      font-size: 1rem;
      line-height: 1.5;
      padding: 0;
      margin: 0;
      color: #666;
    }

    .wrap {
      border: 1px solid #ddd;
      display: inline-block;
      vertical-align: middle;
      background: #fff;
      max-width: 380px;
      padding: 30px;
      margin: 5%;

      -webkit-box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
      -moz-box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
      box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
    }

    a {
      color: #2DB2BA;
      text-decoration: none;
    }

    a:hover {
      color: #1982BB;
    }

    h1 {
      text-transform: uppercase;
      font-weight: normal;
      font-size: 26px;
      font-size: 1.625rem;
      margin: 0 0 0.5em 0;
      line-height: 1.2;
      color: #333;
    }

    p,
    .mugshot {
      margin: 0 0 1em;
    }

    img,
    .mugshot {
      max-width: 100%;
      height: auto;
    }

    .visuallyhidden {
      position: absolute;
      clip: rect(0 0 0 0);
      overflow: hidden;
      border: 0;
      height: 1px;
      width: 1px;
      margin: -1px;
      padding: 0;
    }

    /* -------------------------------------------------------------------------- */
    /* MUGSHOT
    /* -------------------------------------------------------------------------- */
    .mugshot {
      border: 1px solid #ddd;

      -webkit-box-shadow: inset 1px 1px 5px rgba(0,0,0,0.6);
      -moz-box-shadow: inset 1px 1px 5px rgba(0,0,0,0.6);
      box-shadow: inset 1px 1px 5px rgba(0,0,0,0.6);

      -webkit-border-radius: 100%;
      -moz-border-radius: 100%;
      border-radius: 100%;
    }

    /* -------------------------------------------------------------------------- */
    /* VERTICALLY ALIGN ON LARGER DEVICES
    /* -------------------------------------------------------------------------- */
    @media (min-width: 540px) {

      html,
      body {
        height: 100%;
      }

      body:before {
        content: '';
        display: inline-block;
        vertical-align: middle;
        margin-right: -0.25em;
        height: 100%;
      }

    }
  </style>
</head>
<body>

    <header role="banner">

    <main role="main">

        My Projects on <a href="https://themeforest.net/user/warriortheme/portfolio">themeforest</a>
        and <a href="http://codepen.io/smalinux/">codePen</a>.
        You can find me on <a href="http://twitter.com/smalinux">Twitter</a>,
        <a href="http://facebook.com/smalinux">Facebook</a>,
        <a href="http://eg.linkedin.com/in/smalinux">LinkedIn</a>,
        <a href="http://stackoverflow.com/users/5688267/sohaib-mohammed?tab=profile">StackOverflow</a>
        and <a href="https://github.com/smalinux/">GitHub</a>.
      </p>
    </main>
  </div>
